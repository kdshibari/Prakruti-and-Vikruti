<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayurvedic Dosha Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
  :root { --bg-glass: rgba(255, 255, 255, 0.4); --border-glass: rgba(255, 255, 255, 0.7); --text-main: #4a4a4a; --text-muted: #777777; --vata-color: #87c5d8; --pitta-color: #f4a261; --kapha-color: #81c784; }
  body { margin: 0; padding: 20px 15px; font-family: 'Outfit', sans-serif; color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; background: #f8f9fa; }
  .bg-organic { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #fbfdff; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.8; animation: float 20s infinite ease-in-out alternate; }
  .blob.vata-bg { top: -5%; left: -5%; width: 45vw; height: 45vw; background: rgba(135, 197, 216, 0.4); }
  .blob.pitta-bg { top: 35%; right: -5%; width: 40vw; height: 40vw; background: rgba(244, 162, 97, 0.3); animation-delay: 5s; }
  .blob.kapha-bg { bottom: -15%; left: 10%; width: 50vw; height: 50vw; background: rgba(129, 199, 132, 0.3); animation-delay: 10s; }
  @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(4%, 4%) scale(1.05); } }
  .fixed-lang-switch { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 40px; padding: 5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255,255,255,1); }
  .lang-btn { background: transparent; border: none; padding: 8px 12px; border-radius: 30px; cursor: pointer; font-size: 1.3em; transition: all 0.3s ease; filter: grayscale(100%) opacity(0.4); }
  .lang-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); filter: grayscale(0%) opacity(1); transform: scale(1.05); }
  .glass-container { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); padding: 40px; border-radius: 30px; max-width: 900px; width: 100%; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); z-index: 1; margin-top: 20px; }
  .sticky-top-bar { position: sticky; top: 15px; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-radius: 40px; padding: 15px 20px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; width: 100%; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
  .sticky-top-bar.scrolled { padding: 8px 15px; margin-bottom: 15px; top: 10px; width: 60%; margin-left: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
  .progress-container { flex-grow: 1; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; transition: height 0.4s ease; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--vata-color), var(--pitta-color), var(--kapha-color)); width: 0%; transition: width 0.4s ease; border-radius: 10px; }
  .header-section { text-align: center; margin-bottom: 20px; }
  .logo-container { display: inline-flex; padding: 20px; border-radius: 50%; box-shadow: 0 12px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
  h1 { color: #333; font-weight: 600; margin: 5px 0; font-size: 2.2em; }
  .instruction-box { background: rgba(255, 255, 255, 0.7); padding: 15px 20px; border-radius: 12px; margin-top: 15px; font-size: 0.95em; line-height: 1.6; color: #555; border: 1px solid rgba(255,255,255,0.9); }
  .shared-banner { background: linear-gradient(135deg, #e3f2fd, #e8f5e9); padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center; display: none; }
  .question-block { background: rgba(255, 255, 255, 0.65); padding: 30px; border-radius: 24px; margin-bottom: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.02); }
  .question-title { font-size: 1.4em; color: #333; margin-bottom: 20px; text-align: center; font-weight: 600; }
  .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .option-card { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 16px; font-size: 0.85em; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .dosha-icon { width: 28px; height: 28px; margin-bottom: 10px; }
  .option-card.vata .dosha-icon { stroke: var(--vata-color); }
  .option-card.pitta .dosha-icon { stroke: var(--pitta-color); }
  .option-card.kapha .dosha-icon { stroke: var(--kapha-color); }
  .dosha-name { font-size: 1em; margin-bottom: 8px; font-weight: 600; color: #333; }
  .selection-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
  .sel-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; flex: 1; }
  .sel-btn.selected { border-color: #4a4a4a; font-weight: bold; }
  #submit-btn { background: #ffffff; width: 100%; margin-top: 10px; padding: 20px; border-radius: 16px; cursor: pointer; font-weight: 600; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
  .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
  .action-btn { padding: 15px 25px; border-radius: 12px; border: 1px solid #eaeaea; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>
<div class="bg-organic"><div class="blob vata-bg"></div><div class="blob pitta-bg"></div><div class="blob kapha-bg"></div></div>
<div class="fixed-lang-switch">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧</button>
  <button class="lang-btn" id="btn-vi" onclick="setLang('vi')">🇻🇳</button>
</div>
<div class="glass-container">
  <div class="sticky-top-bar" id="sticky-top-bar"><div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div></div>
  <div class="header-section">
    <div class="logo-container">
      <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
        <defs>
          <linearGradient id="p-g" x1="0" y1="0" x2="0" y2="-50"><stop offset="0%" stop-color="#f4a261" stop-opacity="0.2"/><stop offset="100%" stop-color="#f4a261" stop-opacity="0.85"/></linearGradient>
          <linearGradient id="k-g" x1="0" y1="0" x2="0" y2="-50"><stop offset="0%" stop-color="#81c784" stop-opacity="0.2"/><stop offset="100%" stop-color="#81c784" stop-opacity="0.85"/></linearGradient>
          <linearGradient id="v-g" x1="0" y1="0" x2="0" y2="-50"><stop offset="0%" stop-color="#87c5d8" stop-opacity="0.2"/><stop offset="100%" stop-color="#87c5d8" stop-opacity="0.85"/></linearGradient>
        </defs>
        <g transform="translate(50, 52)">
          <path d="M 0 0 C 36 -12, 24 -48, 0 -48 C -24 -48, -36 -12, 0 0 Z" fill="url(#p-g)" stroke="#f4a261" stroke-width="2"/>
          <path d="M 0 0 C 36 -12, 24 -48, 0 -48 C -24 -48, -36 -12, 0 0 Z" fill="url(#k-g)" stroke="#81c784" stroke-width="2" transform="rotate(120)"/>
          <path d="M 0 0 C 36 -12, 24 -48, 0 -48 C -24 -48, -36 -12, 0 0 Z" fill="url(#v-g)" stroke="#87c5d8" stroke-width="2" transform="rotate(240)"/>
          <circle cx="0" cy="0" r="6" fill="#fff" stroke="#4a4a4a" stroke-width="2"/><circle cx="0" cy="0" r="2" fill="#4a4a4a"/>
        </g>
      </svg>
    </div>
    <h1 id="title">Ayurvedic Dosha Quiz</h1>
    <div class="shared-banner" id="shared-banner"></div>
    <div class="instruction-box" id="instructions"></div>
  </div>
  <div id="quiz-content"></div>
  <button onclick="calculateResults()" id="submit-btn">Reveal My Dosha</button>
  <div id="results"></div>
</div>

<script>
  let currentLang = 'en';
  let selections = { prakruti: {}, vikruti: {} };
  let isSharedView = false;
  const translations = {
    en: { title: "Prakruti and Vikruti Quiz", instructions: "<strong>Instructions:</strong> Choose the column that matches you historically (Long Term), and the column for current imbalances (Present).", submit: "Reveal My Dosha", vata: "Vata", pitta: "Pitta", kapha: "Kapha", longTerm: "Long Term (Prakruti):", present: "Present (Vikruti):", resultsLongTerm: "Prakruti (Long Term)", resultsPresent: "Vikruti (Current)", rank: "Rank", primary: "Primary", secondary: "Secondary", tertiary: "Tertiary", dashboardTitle: "Final Dosha Designation", constPrakruti: "Constitution", copyProfile: "Copy Link", shareProfile: "Share", resetQuiz: "Restart", sharedMsg: "You are viewing a shared profile.", copied: "Copied!" },
    vi: { title: "Bảng Câu Hỏi Thể Tạng", instructions: "<strong>Hướng dẫn:</strong> Chọn khuynh hướng phù hợp với bạn từ trước đến nay (Lâu dài), và chọn cho hiện tại nếu mất cân bằng.", submit: "Xem Kết Quả", vata: "Vata", pitta: "Pitta", kapha: "Kapha", longTerm: "Lâu dài (Prakruti):", present: "Hiện tại (Vikruti):", resultsLongTerm: "Prakruti (Lâu dài)", resultsPresent: "Vikruti (Hiện tại)", rank: "Hạng", primary: "Chính", secondary: "Phụ", tertiary: "Thứ 3", dashboardTitle: "Phân Loại Thể Tạng", constPrakruti: "Prakruti", copyProfile: "Sao chép link", shareProfile: "Chia sẻ", resetQuiz: "Làm lại", takeQuiz: "Làm bài", sharedMsg: "Bạn đang xem hồ sơ được chia sẻ.", copied: "Đã sao chép!" }
  };
  const icons = { vata: `<svg class="dosha-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v18m0-18q-4 4-4 9t4 9m0-18q4 4 4 9t-4 9"/></svg>`, pitta: `<svg class="dosha-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c-3.5 0-6 4-6 9 0 4 3.5 11 6 11s6-7 6-11c0-5-2.5-9-6-9z"/><path d="M12 14c-1.5 0-2.5-1-2.5-2.5S10.5 9 12 9s2.5 1 2.5 2.5S13.5 14 12 14z"/></svg>`, kapha: `<svg class="dosha-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/></svg>` };
  const questions = [
    { id: "face", en: { trait: "Face", vata: "Oblong, thin", pitta: "Angular, muscular", kapha: "Round, full" }, vi: { trait: "Gương mặt", vata: "Dài, gầy", pitta: "Góc cạnh", kapha: "Tròn" } },
    /* Add all 31 questions here as per your original file */
  ];

  window.addEventListener('scroll', () => document.getElementById('sticky-top-bar').classList.toggle('scrolled', window.scrollY > 50));
  
  function initQuiz() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('l')) currentLang = params.get('l');
    if (params.has('id')) {
      fetch('/.netlify/functions/getQuiz?id=' + params.get('id')).then(r => r.json()).then(data => {
        selections = data; isSharedView = true; setLang(currentLang);
      });
    } else {
      loadLocalData(); setLang(currentLang);
    }
  }

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('title').innerText = translations[lang].title;
    document.getElementById('instructions').innerHTML = translations[lang].instructions;
    document.getElementById('submit-btn').innerText = translations[lang].submit;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + lang));
    renderQuiz();
    if(isSharedView) displayDashboard(getCurrentCounts(), true);
  }

  function renderQuiz() {
    const container = document.getElementById('quiz-content');
    container.innerHTML = '';
    questions.forEach(q => {
      const qData = q[currentLang];
      const block = document.createElement('div');
      block.className = 'question-block';
      let html = `<div class="question-title">${qData.trait}</div><div class="options-grid">`;
      ['vata', 'pitta', 'kapha'].forEach(d => html += `<div class="option-card ${d}">${icons[d]}<div class="dosha-name">${translations[currentLang][d]}</div></div>`);
      html += `</div><div class="selection-area">`;
      ['prakruti', 'vikruti'].forEach(type => {
        html += `<div class="selection-row"><div class="selection-label">${type === 'prakruti' ? translations[currentLang].longTerm : translations[currentLang].present}</div><div class="selection-buttons">`;
        ['vata', 'pitta', 'kapha'].forEach(d => html += `<button class="sel-btn ${d} ${selections[type][q.id] === d ? 'selected' : ''}" onclick="selectOption('${type}', '${q.id}', '${d}')">${translations[currentLang][d]}</button>`);
        html += `</div></div>`;
      });
      block.innerHTML = html + `</div>`;
      container.appendChild(block);
    });
  }

  function selectOption(type, qId, dosha) {
    selections[type][qId] = selections[type][qId] === dosha ? null : dosha;
    saveLocalData();
    renderQuiz();
    updateProgress();
  }

  function updateProgress() {
    let answered = Object.keys(selections.prakruti).length + Object.keys(selections.vikruti).length;
    document.getElementById('progress-bar').style.width = (answered / (questions.length * 2)) * 100 + '%';
  }

  function calculateResults() { displayDashboard(getCurrentCounts(), false); }

  initQuiz();
</script>
</body>
</html>
