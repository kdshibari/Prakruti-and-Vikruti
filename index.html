<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayurvedic Dosha Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
  
  :root {
    --bg-glass: rgba(255, 255, 255, 0.4);
    --border-glass: rgba(255, 255, 255, 0.7);
    --text-main: #4a4a4a;
    --text-muted: #777777;
    --vata-color: #87c5d8;
    --pitta-color: #f4a261;
    --kapha-color: #81c784;
  }

  body {
    margin: 0;
    padding: 20px 15px;
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    background: #f8f9fa;
  }
  
  .bg-organic {
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh;
    z-index: -1;
    background: #fbfdff;
    overflow: hidden;
    pointer-events: none;
  }
  
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.8;
    animation: float 20s infinite ease-in-out alternate;
  }
  
  .blob.vata-bg { top: -5%; left: -5%; width: 45vw; height: 45vw; background: rgba(135, 197, 216, 0.4); }
  .blob.pitta-bg { top: 35%; right: -5%; width: 40vw; height: 40vw; background: rgba(244, 162, 97, 0.3); animation-delay: 5s; }
  .blob.kapha-bg { bottom: -15%; left: 10%; width: 50vw; height: 50vw; background: rgba(129, 199, 132, 0.3); animation-delay: 10s; }
  
  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(4%, 4%) scale(1.05); }
  }
  
  .glass-container {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    padding: 40px;
    border-radius: 30px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    z-index: 1;
    display: flex;
    flex-direction: column;
  }

  .sticky-top-bar {
    position: sticky;
    top: 15px;
    z-index: 100;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,1);
    border-radius: 40px;
    padding: 10px 15px;
    margin-bottom: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
